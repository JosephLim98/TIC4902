fullnameOverride: kafka-ui

yamlApplicationConfig:
  kafka:
    clusters:
      - name: tic4902
        bootstrapServers: kafka-cluster-kafka-bootstrap:9092
  auth:
    type: disabled
  management:
    health:
      ldap:
        enabled: false
  logging:
    level:
      root: INFO
      io.kafbat.ui: INFO

envs:
  config:
    DYNAMIC_CONFIG_ENABLED: "true"

service:
  type: ClusterIP
  port: 8080
