# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/values.schema.json

controllers:
  main:
    strategy: Recreate
    pod:
      automountServiceAccountToken: true
    serviceAccount:
      identifier: backend
    containers:
      main:
        image:
          repository: tic4902-backend
          tag: latest
          pullPolicy: Never
        env:
          PORT: "3000"
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: postgres-cluster-pguser-nodejs
                key: password
        envFrom:
          - configMapRef:
              identifier: backend-config
          - secretRef:
              identifier: backend-secrets
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /health
            port: 3000
            spec:
              initialDelaySeconds: 15
          readiness:
            enabled: true
            type: HTTP
            path: /health
            port: 3000
            spec:
              initialDelaySeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 3000

configMaps:
  backend-config:
    data:
      DB_HOST: postgres-cluster-primary.tic4902.svc.cluster.local
      DB_PORT: "5432"
      DB_USER: nodejs
      DB_NAME: TIC4902_DB
      MINIO_ENDPOINT: minio-hl.tic4902.svc.cluster.local
      MINIO_PORT: "9000"
      MINIO_PUBLIC_HOST: minio-hl.tic4902.svc.cluster.local
      MINIO_INTERNAL_HOST: minio-hl.tic4902.svc.cluster.local
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

secrets:
  backend-secrets:
    stringData:
      JWT_SECRET: tic4902-k8s-backend-jwt-change-me

serviceAccount:
  backend: {}

rbac:
  roles:
    flink-api:
      type: Role
      rules:
        - apiGroups: ["flink.apache.org"]
          resources: ["flinkdeployments", "flinkstatesnapshots"]
          verbs: ["get", "list", "create", "patch", "delete"]
        - apiGroups: [""]
          resources: ["pods", "events"]
          verbs: ["list"]
  bindings:
    backend-flink:
      type: RoleBinding
      roleRef:
        identifier: flink-api
      subjects:
        - identifier: backend
