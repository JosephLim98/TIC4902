controllers:
  main:
    strategy: Recreate
    containers:
      main:
        image:
          repository: nginx
          tag: alpine
          pullPolicy: IfNotPresent
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /
            port: 80
            spec:
              initialDelaySeconds: 5
          readiness:
            enabled: true
            type: HTTP
            path: /
            port: 80

service:
  main:
    controller: main
    ports:
      http:
        port: 80

configMaps:
  gateway-nginx:
    data:
      default.conf: |
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        server {
            listen 80;

            location /api/ {
                proxy_pass http://backend:3000/api/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header Authorization $http_authorization;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_buffering off;
                proxy_read_timeout 3600s;
            }

            location / {
                proxy_pass http://frontend:80/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }
        }

persistence:
  nginx-config:
    type: configMap
    identifier: gateway-nginx
    globalMounts:
      - path: /etc/nginx/conf.d
        readOnly: true
