apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: default
data:
  promtail-config.yaml: |
    server:
      http_listen_port: 9080
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://host.minikube.internal:3100/loki/api/v1/push
    scrape_configs:
      - job_name: flink-pods
        file_sd_configs:
          - files:
            - /etc/promtail/targets/*.json
            refresh_interval: 15s
        pipeline_stages:
          - docker: {}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: default
spec:
  selector: { 
    matchLabels: { 
      app: promtail 
    }
  }
  template:
    metadata: {
      labels: {
        app: promtail
      }
    }
    spec:
      serviceAccountName: promtail
      # Promtail runs inside the cluster's pod network, which can't resolve
      # host.minikube.internal on its own (that hostname only resolves on
      # the node/host side) — without this, file tailing works fine but
      # every push to Loki fails with "no such host". Same fix as the Flink
      # pods' podTemplate, just hardcoded here since this is a static
      # manifest rather than something generated per-deployment. If this
      # stops working (e.g. after a `minikube delete && minikube start`),
      # get the current value with:
      #   minikube ssh -- getent hosts host.minikube.internal
      hostAliases:
        - ip: "0.250.250.254"
          hostnames:
            - "host.minikube.internal"
      containers:
        - name: promtail
          image: grafana/promtail:3.0.0
          args: ["-config.file=/etc/promtail/promtail-config.yaml"]
          volumeMounts:
            - { name: config, mountPath: /etc/promtail }
            - { name: containers, mountPath: /var/lib/docker/containers, readOnly: true }
            - { name: pods, mountPath: /var/log/pods, readOnly: true }
            - { name: positions, mountPath: /run/promtail }
            - { name: targets, mountPath: /etc/promtail/targets }
        - name: target-writer
          image: alpine/k8s:1.29.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                kubectl get pods -n default -l 'flinkDeployment' -o go-template='[
                {{- $first := true -}}
                {{- range $p := .items -}}
                  {{- if eq $p.status.phase "Running" -}}
                    {{- if not $first }},{{ end -}}
                    {{- $first = false -}}
                    {"targets":["{{ $p.metadata.name }}"],"labels":{"app":"{{ $p.metadata.labels.flinkDeployment }}","component":"{{ $p.metadata.labels.component }}","namespace":"{{ $p.metadata.namespace }}","pod":"{{ $p.metadata.name }}","__path__":"/var/log/pods/{{ $p.metadata.namespace }}_{{ $p.metadata.name }}_{{ $p.metadata.uid }}/flink-main-container/*.log"}}
                  {{- end -}}
                {{- end -}}
                ]' > /etc/promtail/targets/flink-pods.json.tmp
                mv /etc/promtail/targets/flink-pods.json.tmp /etc/promtail/targets/flink-pods.json
                sleep 15
              done
          volumeMounts:
            - { name: targets, mountPath: /etc/promtail/targets }
      volumes:
        - name: config
          configMap: { name: promtail-config }
        - name: containers
          hostPath: { path: /var/lib/docker/containers }
        - name: pods
          hostPath: { path: /var/log/pods }
        - name: positions
          emptyDir: {}
        - name: targets
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: promtail
  namespace: default
spec:
  type: NodePort
  selector:
    app: promtail
  ports:
    - port: 9080
      targetPort: 9080
      nodePort: 30080