auth_enabled: false
server:
  http_listen_port: 3100
common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h
storage_config:
  aws:
    s3: s3://minioadmin:minioadmin@minio:9000/flink-logs
    s3forcepathstyle: true
    insecure: true
limits_config:
  retention_period: 720h
  allow_structured_metadata: false
compactor:
  working_directory: /loki/compactor
  retention_enabled: false
  delete_request_store: s3